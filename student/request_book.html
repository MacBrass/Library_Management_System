<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Book | St. Andrew's Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('student');
    let currentSearch = '';
    let currentPage = 1;
    if (session) renderPage();

    function renderPage() {
        const books = DemoBackend.getBooks({ search: currentSearch, sortBy: 'title' });
        const paginated = DemoBackend.paginate(books, currentPage, 12);

        let bookCards = '';
        paginated.data.forEach(book => {
            const avail = book.available > 0;
            bookCards += `
            <div class="book-card">
                <div class="book-card-cover"><i class="fas fa-book no-cover"></i></div>
                <div class="book-card-body">
                    <h3>${DemoBackend.escapeHtml(book.title)}</h3>
                    <p class="author">${DemoBackend.escapeHtml(book.author)}</p>
                    <p class="availability ${avail ? 'in-stock' : 'out-of-stock'}">${avail ? book.available + ' copies available' : 'Currently unavailable'}</p>
                </div>
                <div class="book-card-footer">
                    ${avail ? `<button class="btn btn-primary btn-sm w-100" onclick="requestBook(${book.id})"><i class="fas fa-hand-holding"></i> Request</button>` :
                    `<button class="btn btn-warning btn-sm w-100" onclick="requestBook(${book.id})"><i class="fas fa-clock"></i> Request (Waitlist)</button>`}
                </div>
            </div>`;
        });

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header"><h1>Request a Book</h1><p>Browse and request books from the library</p></div>
        <div id="alertArea"></div>

        <div class="card mb-3">
            <div class="card-body">
                <div class="d-flex justify-between align-center mb-2">
                    <h2 style="font-size: 1rem; margin: 0;">Search Library</h2>
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('customReqForm').style.display='block';"><i class="fas fa-plus"></i> Request Custom Book</button>
                </div>
                <div class="d-flex gap-1 align-center">
                    <div class="search-box" style="max-width: 100%; flex: 1;">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search by title, author, category, or ISBN..." value="${DemoBackend.escapeHtml(currentSearch)}" id="searchInput" onkeyup="if(event.key==='Enter'){currentSearch=this.value;currentPage=1;renderPage();}">
                    </div>
                    <button class="btn btn-primary" onclick="currentSearch=document.getElementById('searchInput').value;currentPage=1;renderPage();">Search</button>
                    ${currentSearch ? `<a href="#" onclick="currentSearch='';currentPage=1;renderPage();return false;" class="btn btn-outline">Clear</a>` : ''}
                </div>

                <div id="customReqForm" style="display:none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                    <h3 style="font-size: 0.95rem; margin-bottom: 12px;">Request Book Not in Library</h3>
                    <div class="form-row" style="display: flex; gap: 8px;">
                        <div class="form-group mb-0" style="flex: 1;">
                            <input type="text" id="customTitle" class="form-control" placeholder="Book Title (required)">
                        </div>
                        <div class="form-group mb-0" style="flex: 1;">
                            <input type="text" id="customAuthor" class="form-control" placeholder="Author Name (required)">
                        </div>
                        <button class="btn btn-primary" onclick="requestCustomBook()">Submit</button>
                        <button class="btn btn-outline" onclick="document.getElementById('customReqForm').style.display='none';">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="books-grid">
            ${paginated.data.length > 0 ? bookCards : '<div class="empty-state" style="grid-column: 1 / -1;"><i class="fas fa-search"></i><h3>No Books Found</h3><p>' + (currentSearch ? 'Try a different search term.' : 'No books in the library yet.') + '</p></div>'}
        </div>
        ${DemoUI.renderPagination(paginated, (p) => 'currentPage=' + p + '; renderPage()')}`;
    }

    function requestBook(bookId) {
        const result = DemoBackend.createRequest(session.user_id, bookId);
        renderPage();
        if (result.success) {
            if (result.waitlisted) {
                DemoUI.showAlert('alertArea', 'Book "' + DemoBackend.escapeHtml(result.title) + '" is out of stock. Request submitted -> Admin will fulfill when available.', 'warning');
            } else {
                DemoUI.showAlert('alertArea', 'Book "' + DemoBackend.escapeHtml(result.title) + '" requested successfully! Wait for admin approval.', 'success');
            }
        } else {
            DemoUI.showAlert('alertArea', result.error, 'danger');
        }
    }

    function requestCustomBook() {
        const title = document.getElementById('customTitle').value.trim();
        const author = document.getElementById('customAuthor').value.trim();
        if (!title || !author) {
            DemoUI.showAlert('alertArea', 'Please provide both Title and Author for the custom request.', 'danger');
            return;
        }
        const result = DemoBackend.createCustomRequest(session.user_id, title, author);
        renderPage();
        document.getElementById('customReqForm').style.display = 'none';
        if (result.success) {
             DemoUI.showAlert('alertArea', 'Custom book "' + DemoBackend.escapeHtml(title) + '" requested! Admin will fulfill it when added to library.', 'success');
        } else {
             DemoUI.showAlert('alertArea', result.error, 'danger');
        }
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
