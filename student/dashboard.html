<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | FrCRCE Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('student');
    if (session) renderPage();

    function renderPage() {
        const stats = DemoBackend.getUserStats(session.user_id);
        const limitReached = DemoBackend.isBorrowLimitReached(session.user_id, 'student');
        const activeRequests = DemoBackend.getRequests({ userId: session.user_id, activeOnly: true });
        const history = DemoBackend.getBorrowHistory({ userId: session.user_id, limit: 10 });

        let requestRows = '';
        let overdueWarnings = [];
        const fineSettings = DemoBackend.getFineSettings();

        activeRequests.forEach(r => {
            let dueDateCell = '-';
            let overdueInfo = '';
            if (r.status === 'issued' && r.issued_date) {
                const fineInfo = DemoBackend.calculateCurrentFine(r.issued_date, 'student');
                dueDateCell = DemoBackend.dateOnly(fineInfo.dueDate);
                if (fineInfo.isOverdue) {
                    overdueInfo = `<br><small class="text-danger"><i class="fas fa-exclamation-triangle"></i> Overdue ${fineInfo.lateDays}d | Fine: ${fineSettings.currency}${fineInfo.fine.toFixed(2)}</small>`;
                    overdueWarnings.push({ title: r.book_title, days: fineInfo.lateDays, fine: fineInfo.fine });
                }
            }

            requestRows += `<tr>
                <td><strong>${DemoBackend.escapeHtml(r.book_title)}</strong>${overdueInfo}</td>
                <td>${DemoBackend.escapeHtml(r.book_author)}</td>
                <td><span class="badge badge-${r.status}">${r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span></td>
                <td>${DemoBackend.dateOnly(r.request_date)}</td>
                <td>${r.issued_date ? DemoBackend.dateOnly(r.issued_date) : '-'}</td>
                <td>${dueDateCell}</td>
            </tr>`;
        });

        let historyRows = '';
        history.forEach(h => {
            // Check for receipts
            const receipts = DemoBackend.getReceipts({}).filter(rc => rc.book_title === h.book_title && rc.user_name === h.user_name);
            const receiptBtn = receipts.length > 0 ? `<a href="#" onclick="viewReceipt(${receipts[0].id}); return false;" class="btn btn-sm btn-primary" title="View Receipt"><i class="fas fa-receipt"></i></a>` : '';

            historyRows += `<tr>
                <td>${DemoBackend.escapeHtml(h.book_title)}</td>
                <td>${DemoBackend.dateOnly(h.issue_date)}</td>
                <td>${h.return_date ? DemoBackend.dateOnly(h.return_date) : '<span class="text-warning">Not returned</span>'}</td>
                <td>${h.fine > 0 ? '<span class="text-danger">' + fineSettings.currency + h.fine.toFixed(2) + '</span>' : '<span class="text-success">' + fineSettings.currency + '0.00</span>'}</td>
                <td>${receiptBtn}</td>
            </tr>`;
        });

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
            <h1>Welcome, ${DemoBackend.escapeHtml(session.name)}</h1>
            <p>Student Dashboard — Borrow limit: ${stats.issued}/3 books</p>
        </div>

        ${limitReached ? '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle"></i> You have reached your borrow limit of 3 books. Return a book to request more.</div>' : ''}

        ${overdueWarnings.length > 0 ? '<div class="alert alert-danger"><i class="fas fa-clock"></i> <strong>Overdue Alert!</strong> You have ' + overdueWarnings.length + ' overdue book(s). Total accumulated fine: <strong>' + fineSettings.currency + overdueWarnings.reduce((s, o) => s + o.fine, 0).toFixed(2) + '</strong>. Please return immediately to avoid further fines.</div>' : ''}

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-book-reader"></i></div><div class="stat-info"><h3>${stats.issued}</h3><p>Books Issued</p></div></div>
            <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>${stats.pending}</h3><p>Pending Requests</p></div></div>
            <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3>${stats.approved}</h3><p>Approved</p></div></div>
            <div class="stat-card"><div class="stat-icon teal"><i class="fas fa-undo"></i></div><div class="stat-info"><h3>${stats.returned}</h3><p>Returned</p></div></div>
        </div>

        <div class="mb-3">
            <a href="request_book.html" class="btn btn-primary"><i class="fas fa-hand-holding"></i> Browse & Request Books</a>
        </div>

        <div class="card">
            <div class="card-header"><h2><i class="fas fa-clipboard-list"></i> My Active Requests</h2></div>
            <div class="card-body">
                ${activeRequests.length > 0 ? `
                <div class="table-responsive"><table class="data-table">
                    <thead><tr><th>Book</th><th>Author</th><th>Status</th><th>Requested</th><th>Issued</th><th>Due Date</th></tr></thead>
                    <tbody>${requestRows}</tbody>
                </table></div>` : '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No Active Requests</h3><p>Browse books to make a request.</p></div>'}
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h2><i class="fas fa-history"></i> My Borrow History</h2></div>
            <div class="card-body">
                ${history.length > 0 ? `
                <div class="table-responsive"><table class="data-table">
                    <thead><tr><th>Book</th><th>Issued</th><th>Returned</th><th>Fine</th><th>Receipt</th></tr></thead>
                    <tbody>${historyRows}</tbody>
                </table></div>` : '<div class="empty-state"><i class="fas fa-history"></i><h3>No History</h3><p>Your borrowing history will appear here.</p></div>'}
            </div>
        </div>`;
    }

    function viewReceipt(id) {
        const receipt = DemoBackend.getReceiptById(id);
        if (!receipt) return;
        const html = DemoBackend.generateReceiptHTML(receipt);
        const win = window.open('', '_blank', 'width=700,height=900');
        win.document.write(html);
        win.document.close();
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
