<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Request | St. Andrew's Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('professor');
    if (session) renderPage();

    function renderPage() {
        const availableBooks = DemoBackend.getBooks({ availableOnly: true, sortBy: 'title' });
        const students = DemoBackend.getUsers({ role: 'student' }).filter(u => u.status === 'active');

        let bookOptions = '<option value="">-- Choose a Book --</option>';
        availableBooks.forEach(b => {
            bookOptions += `<option value="${b.id}">${DemoBackend.escapeHtml(b.title)} by ${DemoBackend.escapeHtml(b.author)} (${b.available} available)</option>`;
        });

        let studentCheckboxes = '';
        if (students.length > 0) {
            students.forEach(s => {
                studentCheckboxes += `
                <div class="checkbox-item">
                    <input type="checkbox" class="student-checkbox" name="students[]" value="${s.id}" id="student_${s.id}">
                    <label for="student_${s.id}">
                        ${DemoBackend.escapeHtml(s.name)}
                        <span class="text-muted">(${DemoBackend.escapeHtml(s.email)} — ${DemoBackend.escapeHtml(s.department || 'N/A')})</span>
                    </label>
                </div>`;
            });
        } else {
            studentCheckboxes = '<p class="text-muted">No active students found.</p>';
        }

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header"><h1>Bulk Book Request</h1><p>Request books on behalf of your students</p></div>
        <div id="alertArea"></div>
        <div class="card">
            <div class="card-header"><h2><i class="fas fa-layer-group"></i> Create Bulk Request</h2></div>
            <div class="card-body">
                <form id="bulkRequestForm">
                    <div class="form-group">
                        <label for="book_id">Select Book <span class="required">*</span></label>
                        <select class="form-control" id="book_id" required>${bookOptions}</select>
                    </div>
                    <div class="form-group">
                        <label>Select Students <span class="required">*</span></label>
                        <div class="mb-1">
                            <label class="checkbox-item" style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                                <input type="checkbox" id="selectAll">
                                <label for="selectAll" style="font-weight: 600;">Select All Students</label>
                            </label>
                        </div>
                        <div class="checkbox-group">${studentCheckboxes}</div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-success btn-lg" id="bulkSubmitBtn">
                            <i class="fas fa-paper-plane"></i> Submit Bulk Request
                        </button>
                        <a href="dashboard.html" class="btn btn-outline">
                            <i class="fas fa-arrow-left"></i> Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>`;

        // Select all handler
        document.getElementById('selectAll').addEventListener('change', function() {
            document.querySelectorAll('.student-checkbox').forEach(cb => cb.checked = this.checked);
        });

        // Form handler
        document.getElementById('bulkRequestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const bookId = parseInt(document.getElementById('book_id').value);
            const checked = document.querySelectorAll('.student-checkbox:checked');
            const studentIds = Array.from(checked).map(cb => parseInt(cb.value));

            if (!bookId) {
                DemoUI.showAlert('alertArea', 'Please select a book.', 'danger');
                return;
            }
            if (studentIds.length === 0) {
                DemoUI.showAlert('alertArea', 'Please select at least one student.', 'danger');
                return;
            }

            const result = DemoBackend.createBulkRequest(bookId, studentIds);
            if (result.success) {
                DemoUI.showAlert('alertArea', result.message, 'success');
                // Uncheck all
                document.querySelectorAll('.student-checkbox').forEach(cb => cb.checked = false);
                document.getElementById('selectAll').checked = false;
            } else {
                DemoUI.showAlert('alertArea', result.error, 'danger');
            }
        });
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
