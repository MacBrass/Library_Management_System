<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Requests | FrCRCE Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Library_Mangement_System/assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('admin');
    let currentFilter = 'all';
    let currentPage = 1;
    if (session) renderPage();

    function renderPage() {
        const requests = DemoBackend.getRequests({ status: currentFilter });
        const paginated = DemoBackend.paginate(requests, currentPage, 15);

        let rows = '';
        paginated.data.forEach(r => {
            const roleBadge = r.user_role === 'professor' ? 'approved' : 'requested';
            let actions = '';
            if (r.status === 'requested') {
                actions = `
                    <a href="#" onclick="doAction('approve',${r.id}); return false;" class="btn btn-sm btn-success" title="Approve"><i class="fas fa-check"></i></a>
                    <a href="#" onclick="doAction('reject',${r.id}); return false;" class="btn btn-sm btn-danger" title="Reject"><i class="fas fa-times"></i></a>`;
            } else if (r.status === 'approved') {
                actions = `<a href="#" onclick="doAction('issue',${r.id}); return false;" class="btn btn-sm btn-primary" title="Issue Book"><i class="fas fa-hand-holding"></i> Issue</a>`;
            } else if (r.status === 'issued') {
                // Show overdue info if applicable
                const fineInfo = DemoBackend.calculateCurrentFine(r.issued_date, r.user_role);
                let overdueTag = '';
                if (fineInfo.isOverdue) {
                    const s = DemoBackend.getFineSettings();
                    overdueTag = `<br><small class="text-danger"><i class="fas fa-exclamation-triangle"></i> Overdue: ${fineInfo.lateDays}d | Fine: ${s.currency}${fineInfo.fine.toFixed(2)}</small>`;
                }
                actions = `<a href="#" onclick="doAction('return',${r.id}); return false;" class="btn btn-sm btn-warning" title="Return Book"><i class="fas fa-undo"></i> Return</a>${overdueTag}`;
            } else if (r.status === 'returned') {
                // Show view receipt button for returned books
                const receipts = DemoBackend.getReceipts({}).filter(rc => rc.request_id === r.id);
                if (receipts.length > 0) {
                    const lastReceipt = receipts[0];
                    actions = `<a href="#" onclick="viewReceipt(${lastReceipt.id}); return false;" class="btn btn-sm btn-primary" title="View Receipt"><i class="fas fa-receipt"></i></a>`;
                } else {
                    actions = '<span class="text-muted">-</span>';
                }
            } else {
                actions = '<span class="text-muted">-</span>';
            }

            rows += `<tr>
                <td>${r.id}</td>
                <td><strong>${DemoBackend.escapeHtml(r.user_name)}</strong><br><small class="text-muted">${DemoBackend.escapeHtml(r.user_email)}</small></td>
                <td><span class="badge badge-${roleBadge}">${r.user_role.charAt(0).toUpperCase() + r.user_role.slice(1)}</span></td>
                <td><strong>${DemoBackend.escapeHtml(r.book_title)}</strong><br><small class="text-muted">${DemoBackend.escapeHtml(r.book_author)}</small></td>
                <td><span class="badge badge-${r.status}">${r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span></td>
                <td>${DemoBackend.dateOnly(r.request_date)}</td>
                <td>${r.issued_date ? DemoBackend.dateOnly(r.issued_date) : '-'}</td>
                <td><div class="btn-group">${actions}</div></td>
            </tr>`;
        });

        const filters = [
            { key: 'all', label: 'All' }, { key: 'requested', label: 'Pending' },
            { key: 'approved', label: 'Approved' }, { key: 'issued', label: 'Issued' },
            { key: 'returned', label: 'Returned' }, { key: 'rejected', label: 'Rejected' }
        ];
        const filterBtns = filters.map(f =>
            `<a href="#" onclick="currentFilter='${f.key}'; currentPage=1; renderPage(); return false;" class="btn btn-sm ${currentFilter === f.key ? 'btn-primary' : 'btn-outline'}">${f.label}</a>`
        ).join('');

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header"><h1>Book Requests</h1><p>Manage book requests, approvals, and returns</p></div>
        <div id="alertArea"></div>
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-clipboard-list"></i> Requests (${requests.length})</h2>
                <div class="btn-group">${filterBtns}</div>
            </div>
            <div class="card-body">
                ${paginated.data.length > 0 ? `
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>#</th><th>User</th><th>Role</th><th>Book</th><th>Status</th><th>Requested</th><th>Issued</th><th>Actions</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                ${DemoUI.renderPagination(paginated, (p) => 'currentPage=' + p + '; renderPage()')}
                ` : `<div class="empty-state"><i class="fas fa-inbox"></i><h3>No Requests</h3><p>No requests found for the selected filter.</p></div>`}
            </div>
        </div>`;
    }

    function doAction(action, reqId) {
        let result;
        switch (action) {
            case 'approve': result = DemoBackend.approveRequest(reqId); break;
            case 'reject': result = DemoBackend.rejectRequest(reqId); break;
            case 'issue': result = DemoBackend.issueRequest(reqId); break;
            case 'return': result = DemoBackend.returnRequest(reqId); break;
        }
        renderPage();
        if (result && result.success) {
            const s = DemoBackend.getFineSettings();
            let msg = action.charAt(0).toUpperCase() + action.slice(1) + ' successful.';
            if (action === 'return' && result.fine > 0) {
                msg += ' Late return fine: ' + s.currency + result.fine.toFixed(2) + ' (' + result.lateDays + ' days late).';
            }
            if (result.receiptId) {
                msg += ' <a href="#" onclick="viewReceipt(' + result.receiptId + '); return false;" style="color: inherit; font-weight:600;"><i class="fas fa-receipt"></i> View Receipt</a>';
            }
            DemoUI.showAlert('alertArea', msg, 'success');
        } else if (result && result.error) {
            DemoUI.showAlert('alertArea', result.error, 'danger');
        }
    }

    function viewReceipt(id) {
        const receipt = DemoBackend.getReceiptById(id);
        if (!receipt) return;
        const html = DemoBackend.generateReceiptHTML(receipt);
        const win = window.open('', '_blank', 'width=700,height=900');
        win.document.write(html);
        win.document.close();
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
