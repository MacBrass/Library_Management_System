<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Settings | FrCRCE Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('admin');
    if (session) renderPage();

    function renderPage() {
        const s = DemoBackend.getFineSettings();

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
            <h1><i class="fas fa-cog"></i> Fine Settings</h1>
            <p>Configure late return fines, borrow periods, and penalty rules</p>
        </div>
        <div id="alertArea"></div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-sliders-h"></i> Fine Configuration</h2>
            </div>
            <div class="card-body">
                <form id="fineSettingsForm">

                    <!-- General Rules -->
                    <div class="settings-section">
                        <h3 class="settings-title"><i class="fas fa-sliders-h"></i> General Rules</h3>
                        <div class="form-row" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                            <div class="form-group mb-0">
                                <label for="borrowPeriod">Borrow Period (days)</label>
                                <input type="number" class="form-control form-control-sm" id="borrowPeriod" value="${s.borrowPeriod}" min="1" max="365" required>
                            </div>
                            <div class="form-group mb-0">
                                <label for="noReturnDays">No-Return Threshold</label>
                                <input type="number" class="form-control form-control-sm" id="noReturnDays" value="${s.noReturnDays}" min="1" max="365" required>
                            </div>
                            <div class="form-group mb-0">
                                <label for="currency">Currency Symbol</label>
                                <input type="text" class="form-control form-control-sm" id="currency" value="${DemoBackend.escapeHtml(s.currency)}" maxlength="5" required>
                            </div>
                        </div>
                    </div>

                    <!-- Fine Mode -->
                    <div class="settings-section">
                        <h3 class="settings-title"><i class="fas fa-calculator"></i> Calculation Mode</h3>
                        <div class="fine-mode-cards">
                            <label class="mode-card ${s.fineMode === 'per_day' ? 'selected' : ''}" id="modePerDayCard">
                                <input type="radio" name="fineMode" value="per_day" ${s.fineMode === 'per_day' ? 'checked' : ''}>
                                <div class="mode-icon"><i class="fas fa-chart-line"></i></div>
                                <h4>Per Day</h4>
                                <p>Increases daily</p>
                            </label>
                            <label class="mode-card ${s.fineMode === 'fixed' ? 'selected' : ''}" id="modeFixedCard">
                                <input type="radio" name="fineMode" value="fixed" ${s.fineMode === 'fixed' ? 'checked' : ''}>
                                <div class="mode-icon"><i class="fas fa-lock"></i></div>
                                <h4>Fixed Rate</h4>
                                <p>Flat penalty</p>
                            </label>
                        </div>
                    </div>

                    <!-- Role Rates & Penalties -->
                    <div class="settings-section pb-0">
                        <h3 class="settings-title"><i class="fas fa-coins"></i> Role Rates & Penalties</h3>
                        <div class="form-row" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                            
                            <!-- Rates (Shows based on mode) -->
                            <div class="form-group mb-0 rates-per-day" style="${s.fineMode === 'per_day' ? '' : 'display:none'}">
                                <label for="studentFinePerDay">Student Fast Rate</label>
                                <div class="input-with-prefix">
                                    <span class="input-prefix" id="sym1">${DemoBackend.escapeHtml(s.currency)}</span>
                                    <input type="number" class="form-control form-control-sm" id="studentFinePerDay" value="${s.studentFinePerDay}" min="0" step="0.5" required>
                                </div>
                            </div>
                            <div class="form-group mb-0 rates-per-day" style="${s.fineMode === 'per_day' ? '' : 'display:none'}">
                                <label for="professorFinePerDay">Professor Fast Rate</label>
                                <div class="input-with-prefix">
                                    <span class="input-prefix" id="sym2">${DemoBackend.escapeHtml(s.currency)}</span>
                                    <input type="number" class="form-control form-control-sm" id="professorFinePerDay" value="${s.professorFinePerDay}" min="0" step="0.5" required>
                                </div>
                            </div>

                            <div class="form-group mb-0 rates-fixed" style="${s.fineMode === 'fixed' ? '' : 'display:none'}">
                                <label for="studentFixedFine">Student Fixed Rate</label>
                                <div class="input-with-prefix">
                                    <span class="input-prefix" id="sym3">${DemoBackend.escapeHtml(s.currency)}</span>
                                    <input type="number" class="form-control form-control-sm" id="studentFixedFine" value="${s.studentFixedFine}" min="0" step="1" required>
                                </div>
                            </div>
                            <div class="form-group mb-0 rates-fixed" style="${s.fineMode === 'fixed' ? '' : 'display:none'}">
                                <label for="professorFixedFine">Professor Fixed Rate</label>
                                <div class="input-with-prefix">
                                    <span class="input-prefix" id="sym4">${DemoBackend.escapeHtml(s.currency)}</span>
                                    <input type="number" class="form-control form-control-sm" id="professorFixedFine" value="${s.professorFixedFine}" min="0" step="1" required>
                                </div>
                            </div>

                            <!-- Max Penalty -->
                            <div class="form-group mb-0">
                                <label for="noReturnFine">Max (No-Return) Penalty</label>
                                <div class="input-with-prefix">
                                    <span class="input-prefix" id="sym5">${DemoBackend.escapeHtml(s.currency)}</span>
                                    <input type="number" class="form-control form-control-sm" id="noReturnFine" value="${s.noReturnFine}" min="0" step="10" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Fine Preview -->
                    <div class="settings-section" id="finePreview">
                        <h3 class="settings-title"><i class="fas fa-eye"></i> Live Preview</h3>
                        <div id="previewContent"></div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary btn-lg" id="saveFineSettingsBtn">
                            <i class="fas fa-save"></i> Save Settings
                        </button>
                        <button type="button" class="btn btn-outline" onclick="resetDefaults()">
                            <i class="fas fa-undo"></i> Reset to Defaults
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <style>
            .settings-section { padding: 20px 0; border-bottom: 1px solid var(--border-color); }
            .settings-section:last-of-type { border-bottom: none; }
            .settings-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
            .settings-title i { color: var(--primary); }
            .fine-mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
            .mode-card { display: block; padding: 20px; border: 2px solid var(--border-color); border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
            .mode-card:hover { border-color: var(--primary); background: rgba(30,58,95,0.03); }
            .mode-card.selected { border-color: var(--primary); background: rgba(30,58,95,0.06); box-shadow: 0 0 0 3px rgba(30,58,95,0.15); }
            .mode-card input[type="radio"] { display: none; }
            .mode-icon { font-size: 1.8rem; color: var(--primary); margin-bottom: 10px; }
            .mode-card h4 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
            .mode-card p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
            .input-with-prefix { display: flex; align-items: center; }
            .input-prefix { background: var(--bg-body); border: 1px solid var(--border-color); border-right: 0; border-radius: 8px 0 0 8px; padding: 10px 12px; font-weight: 600; color: var(--text-muted); min-width: 36px; text-align: center; }
            .input-with-prefix .form-control { border-radius: 0 8px 8px 0; }
            .preview-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
            .preview-table th, .preview-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
            .preview-table th { background: var(--bg-body); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
            .mb-2 { margin-bottom: 12px; }
            .mb-0 { margin-bottom: 0 !important; }
            .pb-0 { padding-bottom: 0 !important; }
            .form-control-sm { padding: 8px 12px; font-size: 0.9rem; }
            @media (max-width: 600px) { .fine-mode-cards { grid-template-columns: 1fr; } }
        </style>`;

        // Mode toggle behavior
        document.querySelectorAll('input[name="fineMode"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
                this.closest('.mode-card').classList.add('selected');
                const isPerDay = this.value === 'per_day';
                document.querySelectorAll('.rates-per-day').forEach(el => el.style.display = isPerDay ? '' : 'none');
                document.querySelectorAll('.rates-fixed').forEach(el => el.style.display = isPerDay ? 'none' : '');
                updatePreview();
            });
        });

        // Sync currency symbol prefixes
        document.getElementById('currency').addEventListener('input', function() {
            const sym = this.value || '₹';
            document.querySelectorAll('.input-prefix').forEach(el => el.textContent = sym);
            updatePreview();
        });

        // Live preview update
        document.querySelectorAll('#fineSettingsForm input, #fineSettingsForm select').forEach(inp => {
            if (inp.id !== 'currency') {
                inp.addEventListener('input', updatePreview);
            }
        });

        updatePreview();

        // Save handler
        document.getElementById('fineSettingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const mode = document.querySelector('input[name="fineMode"]:checked').value;
            const settings = {
                fineMode: mode,
                borrowPeriod: parseInt(document.getElementById('borrowPeriod').value) || 14,
                studentFinePerDay: parseFloat(document.getElementById('studentFinePerDay').value) || 5,
                professorFinePerDay: parseFloat(document.getElementById('professorFinePerDay').value) || 3,
                studentFixedFine: parseFloat(document.getElementById('studentFixedFine').value) || 50,
                professorFixedFine: parseFloat(document.getElementById('professorFixedFine').value) || 30,
                noReturnDays: parseInt(document.getElementById('noReturnDays').value) || 60,
                noReturnFine: parseFloat(document.getElementById('noReturnFine').value) || 500,
                currency: document.getElementById('currency').value.trim() || '₹'
            };
            DemoBackend.saveFineSettings(settings);
            DemoUI.showAlert('alertArea', 'Fine settings saved successfully!', 'success');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function updatePreview() {
        const c = document.getElementById('currency').value || '₹';
        const mode = document.querySelector('input[name="fineMode"]:checked')?.value || 'per_day';
        const bp = parseInt(document.getElementById('borrowPeriod').value) || 14;
        const sfpd = parseFloat(document.getElementById('studentFinePerDay').value) || 0;
        const pfpd = parseFloat(document.getElementById('professorFinePerDay').value) || 0;
        const sff = parseFloat(document.getElementById('studentFixedFine').value) || 0;
        const pff = parseFloat(document.getElementById('professorFixedFine').value) || 0;
        const nrd = parseInt(document.getElementById('noReturnDays').value) || 60;
        const nrf = parseFloat(document.getElementById('noReturnFine').value) || 0;

        const scenarios = [
            { label: 'On time (day ' + bp + ')', days: bp },
            { label: '1 day late', days: bp + 1 },
            { label: '7 days late', days: bp + 7 },
            { label: '30 days late', days: bp + 30 },
            { label: 'No return (' + nrd + '+ days)', days: nrd }
        ];

        let html = '<table class="preview-table"><thead><tr><th>Scenario</th><th>Student Fine</th><th>Professor Fine</th></tr></thead><tbody>';
        scenarios.forEach(sc => {
            const lateDays = Math.max(0, sc.days - bp);
            let sf = 0, pf = 0;
            if (sc.days >= nrd) { sf = nrf; pf = nrf; }
            else if (lateDays > 0) {
                if (mode === 'fixed') { sf = sff; pf = pff; }
                else { sf = lateDays * sfpd; pf = lateDays * pfpd; }
            }
            const sfClass = sf > 0 ? 'text-danger' : 'text-success';
            const pfClass = pf > 0 ? 'text-danger' : 'text-success';
            html += '<tr><td>' + sc.label + '</td><td class="' + sfClass + '">' + c + sf.toFixed(2) + '</td><td class="' + pfClass + '">' + c + pf.toFixed(2) + '</td></tr>';
        });
        html += '</tbody></table>';

        const preview = document.getElementById('previewContent');
        if (preview) preview.innerHTML = html;
    }

    function resetDefaults() {
        if (confirm('Reset all fine settings to defaults?')) {
            DemoBackend.saveFineSettings({
                fineMode: 'per_day', borrowPeriod: 14,
                studentFinePerDay: 5, professorFinePerDay: 3,
                studentFixedFine: 50, professorFixedFine: 30,
                noReturnDays: 60, noReturnFine: 500, currency: '₹'
            });
            renderPage();
            DemoUI.showAlert('alertArea', 'Fine settings reset to defaults.', 'success');
        }
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
