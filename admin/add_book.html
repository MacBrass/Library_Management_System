<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book | FrCRCE Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Library_Management_System/assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('admin');
    if (session) renderPage();

    function renderPage() {
        const categories = ['Computer Science', 'Software Engineering', 'Networking',
            'Artificial Intelligence', 'Mathematics', 'Physics',
            'Chemistry', 'Biology', 'Literature', 'History',
            'Economics', 'Management', 'Other'];

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
            <h1>Add New Book</h1>
            <p>Add a new book to the library collection</p>
        </div>

        <div id="alertArea"></div>

        <div class="card">
            <div class="card-header"><h2><i class="fas fa-plus-circle"></i> Book Details</h2></div>
            <div class="card-body">
                <form id="addBookForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Book Title <span class="required">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" placeholder="Enter book title" required>
                        </div>
                        <div class="form-group">
                            <label for="author">Author <span class="required">*</span></label>
                            <input type="text" class="form-control" id="author" name="author" placeholder="Enter author name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="isbn">ISBN</label>
                            <input type="text" class="form-control" id="isbn" name="isbn" placeholder="e.g., 9780262033848">
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select class="form-control" id="category" name="category">
                                <option value="">Select Category</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="publisher">Publisher</label>
                            <input type="text" class="form-control" id="publisher" name="publisher" placeholder="Enter publisher name">
                        </div>
                        <div class="form-group">
                            <label for="year">Year of Publication</label>
                            <input type="number" class="form-control" id="year" name="year" placeholder="e.g., 2023" min="1900" max="2026">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantity">Quantity <span class="required">*</span></label>
                            <input type="number" class="form-control" id="quantity" name="quantity" placeholder="Number of copies" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>Book Cover Image</label>
                            <div class="upload-area" id="coverUploadArea">
                                <input type="file" id="coverImageFile" accept="image/*">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p>Drag & drop image here or click to browse</p>
                                <div class="upload-preview" id="coverPreview" style="display:none; margin-top:10px;">
                                    <img id="previewImg" style="max-height: 100px; border-radius: 4px; border: 1px solid var(--border-color);" alt="preview">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBookBtn">
                            <i class="fas fa-plus-circle"></i> Add Book
                        </button>
                        <a href="manage_books.html" class="btn btn-outline">
                            <i class="fas fa-arrow-left"></i> Back to Books
                        </a>
                    </div>
                </form>
            </div>
        </div>`;

        document.getElementById('addBookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBookBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';
            btn.disabled = true;

            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const quantity = parseInt(document.getElementById('quantity').value) || 1;

            if (!title || !author) {
                DemoUI.showAlert('alertArea', 'Book title and author are required.', 'danger');
                btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add Book';
                btn.disabled = false;
                return;
            }
            if (quantity < 1) {
                DemoUI.showAlert('alertArea', 'Quantity must be at least 1.', 'danger');
                btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add Book';
                btn.disabled = false;
                return;
            }

            const result = DemoBackend.addBook({
                title, author,
                isbn: document.getElementById('isbn').value.trim(),
                category: document.getElementById('category').value,
                publisher: document.getElementById('publisher').value.trim(),
                year: parseInt(document.getElementById('year').value) || 0,
                quantity,
                cover_image: uploadedCoverBase64
            });

            if (result.success) {
                DemoUI.showAlert('alertArea', 'Book "' + DemoBackend.escapeHtml(result.title) + '" added successfully!', 'success');
                e.target.reset();
                uploadedCoverBase64 = '';
                document.getElementById('coverPreview').style.display = 'none';
            } else {
                DemoUI.showAlert('alertArea', 'Failed to add book.', 'danger');
            }
            btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add Book';
            btn.disabled = false;
        });

        // Setup drag and drop
        let uploadedCoverBase64 = '';
        const fileInput = document.getElementById('coverImageFile');
        const uploadArea = document.getElementById('coverUploadArea');
        const preview = document.getElementById('coverPreview');
        const previewImg = document.getElementById('previewImg');

        fileInput.addEventListener('change', function(e) { handleFile(e.target.files[0]); });
        
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--accent)'; });
        uploadArea.addEventListener('dragleave', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--border-color)'; });
        uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--border-color)'; handleFile(e.dataTransfer.files[0]); });

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = e => {
                uploadedCoverBase64 = e.target.result;
                previewImg.src = uploadedCoverBase64;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
