<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="St. Andrew's College Library Management System - Admin Dashboard">
    <title>Admin Dashboard | St. Andrew's Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
    <script src="../assets/js/demo-ui.js"></script>
</head>
<body>
<script>
    const session = DemoUI.initLayout('admin');
    if (session) renderPage();

    function renderPage() {
        const stats = DemoBackend.getAdminStats();
        const recentRequests = DemoBackend.getRequests({}).slice(0, 10);
        const recentHistory = DemoBackend.getBorrowHistory({ limit: 10 });
        const overdueBooks = DemoBackend.getOverdueBooks();
        const fineSettings = DemoBackend.getFineSettings();
        const c = fineSettings.currency;
        const totalCollectedFines = DemoBackend.getReceipts({}).filter(r => r.fine > 0).reduce((s, r) => s + r.fine, 0);
        const accruedFines = overdueBooks.reduce((s, o) => s + o.fine, 0);

        let requestsRows = '';
        if (recentRequests.length > 0) {
            recentRequests.forEach(r => {
                const roleBadge = r.user_role === 'professor' ? 'approved' : 'requested';
                requestsRows += `<tr>
                    <td>${DemoBackend.escapeHtml(r.user_name)}</td>
                    <td><span class="badge badge-${roleBadge}">${r.user_role.charAt(0).toUpperCase() + r.user_role.slice(1)}</span></td>
                    <td>${DemoBackend.escapeHtml(r.book_title)}</td>
                    <td><span class="badge badge-${r.status}">${r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span></td>
                    <td>${DemoBackend.dateOnly(r.request_date)}</td>
                </tr>`;
            });
        }

        let historyRows = '';
        if (recentHistory.length > 0) {
            recentHistory.forEach(h => {
                historyRows += `<tr>
                    <td>${DemoBackend.escapeHtml(h.user_name)}</td>
                    <td>${DemoBackend.escapeHtml(h.book_title)}</td>
                    <td>${DemoBackend.dateOnly(h.issue_date)}</td>
                    <td>${h.return_date ? DemoBackend.dateOnly(h.return_date) : '<span class="text-warning">Not Returned</span>'}</td>
                    <td>${h.fine > 0 ? '<span class="text-danger">' + c + h.fine.toFixed(2) + '</span>' : '<span class="text-success">' + c + '0.00</span>'}</td>
                </tr>`;
            });
        }

        document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
            <h1>Dashboard</h1>
            <p>Library overview and statistics</p>
        </div>

        ${overdueBooks.length > 0 ? '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> <strong>' + overdueBooks.length + ' overdue book(s)!</strong> Total accrued fines: <strong>' + c + accruedFines.toFixed(2) + '</strong>. <a href="overdue.html" style="color:inherit; font-weight:600;">View overdue list →</a></div>' : ''}

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-book"></i></div><div class="stat-info"><h3>${stats.totalBooks}</h3><p>Total Books</p></div></div>
            <div class="stat-card"><div class="stat-icon green"><i class="fas fa-book-reader"></i></div><div class="stat-info"><h3>${stats.totalBorrowed}</h3><p>Currently Issued</p></div></div>
            <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>${stats.pendingRequests}</h3><p>Pending Requests</p></div></div>
            <div class="stat-card"><div class="stat-icon red"><i class="fas fa-exclamation-circle"></i></div><div class="stat-info"><h3>${overdueBooks.length}</h3><p>Overdue Books</p></div></div>
            <div class="stat-card"><div class="stat-icon teal"><i class="fas fa-coins"></i></div><div class="stat-info"><h3>${c}${totalCollectedFines.toFixed(0)}</h3><p>Fines Collected</p></div></div>
            <div class="stat-card"><div class="stat-icon red"><i class="fas fa-user-graduate"></i></div><div class="stat-info"><h3>${stats.totalStudents}</h3><p>Students</p></div></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-clipboard-list"></i> Recent Book Requests</h2>
                <a href="requests.html" class="btn btn-sm btn-outline">View All</a>
            </div>
            <div class="card-body">
                ${recentRequests.length > 0 ? `
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>User</th><th>Role</th><th>Book</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>${requestsRows}</tbody>
                    </table>
                </div>` : '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No Requests Yet</h3><p>Book requests will appear here.</p></div>'}
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-history"></i> Recent Borrow History</h2>
            </div>
            <div class="card-body">
                ${recentHistory.length > 0 ? `
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>User</th><th>Book</th><th>Issued</th><th>Returned</th><th>Fine</th></tr></thead>
                        <tbody>${historyRows}</tbody>
                    </table>
                </div>` : '<div class="empty-state"><i class="fas fa-history"></i><h3>No History Yet</h3><p>Borrowing history will appear here.</p></div>'}
            </div>
        </div>`;
    }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
