<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to FrCRCE college Library Management System">
    <title>Login | FrCRCE Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Library_Management_System/assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>FrCRCE college Library Portal</p>
            </div>

            <div id="alertArea"></div>

            <!-- Demo credentials info -->
            <div style="background: linear-gradient(135deg, #eef2ff, #e8f4f8); border: 1px solid #c7d2fe; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 0.82rem;">
                <strong style="color: #4338ca;"><i class="fas fa-info-circle"></i> Demo Credentials:</strong><br>
                <span style="color:#555;">Admin: <code>admin@crce.edu.in</code> / <code>Admin123</code></span><br>
                <span style="color:#555;">Prof: <code>prof@crce.edu.in</code> / <code>Prof1234</code></span><br>
                <span style="color:#555;">Student: <code>student@crce.edu.in</code> / <code>Student123</code></span>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="you@crce.edu.in" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginSubmitBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        // If already logged in, redirect
        if (DemoBackend.isLoggedIn()) {
            const s = DemoBackend.getSession();
            window.location.href = '../' + s.role + '/dashboard.html';
        }

        // Show URL params messages
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            showAlert(params.get('error'), 'danger');
        }
        if (params.get('success')) {
            showAlert(params.get('success'), 'success');
        }

        function showAlert(msg, type) {
            const area = document.getElementById('alertArea');
            const icon = type === 'danger' ? 'exclamation-circle' : 'check-circle';
            area.innerHTML = '<div class="alert alert-' + type + '"><i class="fas fa-' + icon + '"></i> ' + DemoBackend.escapeHtml(msg) + '</div>';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Client-side validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !password) {
                showAlert('Please fill in all fields.', 'danger');
                return;
            }
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address.', 'danger');
                return;
            }
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters.', 'danger');
                return;
            }

            const result = DemoBackend.login(email, password);
            if (result.success) {
                window.location.href = '../' + result.role + '/dashboard.html';
            } else {
                showAlert(result.error, 'danger');
            }
        });
    </script>
</body>
</html>
