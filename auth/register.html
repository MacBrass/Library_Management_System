<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for FrCRCE college Library Management System">
    <title>Register | FrCRCE Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Library_Management_System/assets/css/style.css">
    <script src="../assets/js/demo-backend.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Create Account</h1>
                <p>Join FrCRCE college Library Portal</p>
            </div>

            <div id="alertArea"></div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" 
                           placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="you@crce.edu.in" required>
                </div>
                <div class="form-group">
                    <label for="role">I am a <span class="required">*</span></label>
                    <select class="form-control" id="role" name="role" required>
                        <option value="student">Student</option>
                        <option value="professor">Professor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" class="form-control" id="department" name="department" 
                           placeholder="e.g., Computer Science">
                </div>
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Minimum 8 chars, 1 uppercase, 1 number" required>
                    <span class="form-help">Min 8 characters, at least one uppercase letter and one number</span>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirm_password" 
                           placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="registerSubmitBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        // If already logged in, redirect
        if (DemoBackend.isLoggedIn()) {
            const s = DemoBackend.getSession();
            window.location.href = '../' + s.role + '/dashboard.html';
        }

        function showAlert(msg, type) {
            const area = document.getElementById('alertArea');
            const icon = type === 'danger' ? 'exclamation-circle' : 'check-circle';
            area.innerHTML = '<div class="alert alert-' + type + '"><i class="fas fa-' + icon + '"></i> ' + DemoBackend.escapeHtml(msg) + '</div>';
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const department = document.getElementById('department').value.trim();

            // Validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!name || !email || !password || !confirmPassword) {
                showAlert('Please fill in all required fields.', 'danger'); return;
            }
            if (name.length < 2) {
                showAlert('Name must be at least 2 characters.', 'danger'); return;
            }
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address.', 'danger'); return;
            }
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters.', 'danger'); return;
            }
            if (!/[A-Z]/.test(password)) {
                showAlert('Password must contain at least one uppercase letter.', 'danger'); return;
            }
            if (!/[0-9]/.test(password)) {
                showAlert('Password must contain at least one number.', 'danger'); return;
            }
            if (password !== confirmPassword) {
                showAlert('Passwords do not match.', 'danger'); return;
            }

            const result = DemoBackend.register(name, email, password, role, department);
            if (result.success) {
                window.location.href = 'login.html?success=Registration successful! Please login.';
            } else {
                showAlert(result.error, 'danger');
            }
        });
    </script>
</body>
</html>
